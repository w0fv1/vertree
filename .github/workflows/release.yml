name: Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Windows build mode"
        required: true
        default: "Release"
        type: choice
        options:
          - Release
          - Profile
          - Debug
  push:
    tags:
      - "V*"
      - "v*"

permissions:
  contents: write

jobs:
  meta:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pubspec.outputs.version }}
      notes_file: ${{ steps.notes.outputs.notes_file }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read version from pubspec.yaml
        id: pubspec
        shell: bash
        run: |
          version="$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml | head -n1)"
          if [[ -z "$version" ]]; then
            echo "pubspec.yaml missing version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "pubspec version=$version"

      - name: Verify tag matches pubspec
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#V}"
          tag="${tag#v}"
          if [[ "$tag" != "${{ steps.pubspec.outputs.version }}" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match pubspec version ${{ steps.pubspec.outputs.version }}" >&2
            exit 1
          fi

      - name: Resolve release notes file
        id: notes
        shell: bash
        run: |
          notes_file=".github/release-${{ steps.pubspec.outputs.version }}.md"
          if [[ -f "$notes_file" ]]; then
            echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"
          fi

  windows:
    name: Windows
    runs-on: windows-latest
    needs: meta
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        shell: pwsh
        run: flutter pub get

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Install WiX Toolset
        shell: pwsh
        run: choco install wixtoolset -y --no-progress

      - name: Build Windows artifacts
        shell: pwsh
        env:
          VERTREE_ENABLE_UNSIGNED_MSIX: "1"
        run: |
          $mode = "${{ github.event.inputs.build_mode }}"
          if ([string]::IsNullOrWhiteSpace($mode)) { $mode = "Release" }
          pwsh -NoProfile -ExecutionPolicy Bypass -File windows/build.ps1 -BuildMode $mode

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: vertree-windows-${{ needs.meta.outputs.version }}
          path: |
            windows/vertree-windows-x64-${{ needs.meta.outputs.version }}-setup.exe
            windows/vertree-windows-x64-${{ needs.meta.outputs.version }}.zip
            windows/vertree-windows-x64-${{ needs.meta.outputs.version }}.msi
            windows/vertree-windows-x64-${{ needs.meta.outputs.version }}-symbols.zip
            windows/vertree-windows-x64-${{ needs.meta.outputs.version }}-win11-dev.zip

      - name: Upload Windows MSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: vertree-windows-msix-${{ needs.meta.outputs.version }}
          path: windows/vertree-windows-x64-${{ needs.meta.outputs.version }}.msix
          if-no-files-found: warn

  linux:
    name: Linux (tar.gz + RPM)
    runs-on: ubuntu-24.04
    needs: meta
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libnotify-dev \
            libayatana-appindicator3-dev \
            libblkid-dev \
            liblzma-dev \
            rpm \
            desktop-file-utils \
            appstream

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux desktop
        shell: bash
        run: flutter config --enable-linux-desktop

      - name: Flutter pub get
        shell: bash
        run: flutter pub get

      - name: Build Linux release archive
        shell: bash
        run: |
          chmod +x linux/build_linux_release.sh linux/build_linux_rpm.sh linux/build_linux_deb.sh
          linux/build_linux_release.sh

      - name: Build Linux DEB
        shell: bash
        run: |
          SKIP_FLUTTER_BUILD=1 linux/build_linux_deb.sh

      - name: Build Linux RPM
        shell: bash
        run: |
          SKIP_FLUTTER_BUILD=1 linux/build_linux_rpm.sh

      - name: Upload Linux archive artifact
        uses: actions/upload-artifact@v6
        with:
          name: vertree-linux-archive-${{ needs.meta.outputs.version }}
          path: build/dist/vertree-linux-x64-${{ needs.meta.outputs.version }}.tar.gz

      - name: Upload Linux RPM artifacts
        uses: actions/upload-artifact@v6
        with:
          name: vertree-linux-rpm-${{ needs.meta.outputs.version }}
          path: build/dist/*.rpm

      - name: Upload Linux DEB artifacts
        uses: actions/upload-artifact@v6
        with:
          name: vertree-linux-deb-${{ needs.meta.outputs.version }}
          path: build/dist/*.deb

  macos:
    name: macOS
    runs-on: macos-latest
    needs: meta
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        shell: bash
        run: flutter config --enable-macos-desktop

      - name: Install CocoaPods
        shell: bash
        run: brew install cocoapods

      - name: Flutter pub get
        shell: bash
        run: flutter pub get

      - name: Build macOS artifacts
        shell: bash
        run: |
          chmod +x macos/build_macos_release.sh
          macos/build_macos_release.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: vertree-macos-${{ needs.meta.outputs.version }}
          path: |
            build/dist/vertree-macos-*-${{ needs.meta.outputs.version }}.zip
            build/dist/vertree-macos-*-${{ needs.meta.outputs.version }}.dmg
            build/dist/vertree-macos-*-${{ needs.meta.outputs.version }}-symbols.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - meta
      - windows
      - linux
      - macos
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve release notes
        id: notes
        shell: bash
        run: |
          notes_file=".github/release-${{ needs.meta.outputs.version }}.md"
          if [[ -f "$notes_file" ]]; then
            echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"
          else
            : > /tmp/vertree-release-notes.md
            echo "notes_file=/tmp/vertree-release-notes.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf release-artifacts release-assets
          mkdir -p release-artifacts release-assets
          gh run download "$GITHUB_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --dir release-artifacts

          find release-artifacts -type f -print0 | while IFS= read -r -d '' file; do
            cp "$file" "release-assets/$(basename "$file")"
          done

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Verify release assets staging
        shell: bash
        run: |
          shopt -s nullglob
          release_files=(release-assets/*)
          real_assets=()
          for file in "${release_files[@]}"; do
            if [[ "$(basename "$file")" != "SHA256SUMS.txt" ]]; then
              real_assets+=("$file")
            fi
          done

          if [[ ${#real_assets[@]} -eq 0 ]]; then
            echo "No staged binary release assets were found." >&2
            exit 1
          fi

          printf 'Staged release assets:\n'
          printf ' - %s\n' "${release_files[@]#release-assets/}"

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current_ref="${GITHUB_REF#refs/tags/}"
          expected_version="${{ needs.meta.outputs.version }}"
          if [[ -z "$current_ref" || "$current_ref" == "$GITHUB_REF" ]]; then
            echo "Release workflow did not receive a tag ref. GITHUB_REF=$GITHUB_REF" >&2
            exit 1
          fi

          normalized_tag="${current_ref#V}"
          normalized_tag="${normalized_tag#v}"
          if [[ "$normalized_tag" != "$expected_version" ]]; then
            echo "Resolved tag $current_ref does not match expected version $expected_version" >&2
            exit 1
          fi

          tag="$current_ref"
          notes_file="${{ steps.notes.outputs.notes_file }}"
          prerelease_flag=()
          if [[ "${{ contains(needs.meta.outputs.version, '-') }}" == "true" ]]; then
            prerelease_flag+=(--prerelease)
          fi

          echo "Publishing release for tag: $tag"

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --notes-file "$notes_file" \
              "${prerelease_flag[@]}"
          else
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --notes-file "$notes_file" \
              "${prerelease_flag[@]}"
          fi

          mapfile -d '' asset_files < <(find release-assets -maxdepth 1 -type f -print0 | sort -z)
          if [[ ${#asset_files[@]} -eq 0 ]]; then
            echo "No release files were found to upload." >&2
            exit 1
          fi

          release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$tag" --jq '.id')"
          upload_url="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$tag" --jq '.upload_url')"
          upload_url="${upload_url%\{*}"

          for file in "${asset_files[@]}"; do
            name="$(basename "$file")"
            asset_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/$release_id/assets" --jq ".[] | select(.name == \"$name\") | .id" | head -n1 || true)"
            if [[ -n "$asset_id" ]]; then
              gh api "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id" --method DELETE >/dev/null
            fi

            encoded_name="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1]))' "$name")"
            curl --fail-with-body --silent --show-error \
              -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$file" \
              "${upload_url}?name=${encoded_name}" >/dev/null
          done

          uploaded_count="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$tag" --jq '.assets | length')"
          echo "Uploaded release asset count: $uploaded_count"
          if (( uploaded_count < ${#asset_files[@]} )); then
            echo "Release asset upload incomplete: expected at least ${#asset_files[@]}, got $uploaded_count" >&2
            exit 1
          fi
